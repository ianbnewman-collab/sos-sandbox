  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

; color: #6a6488; text-decoration: none; padding: 6px 14px; border-radius: 3px;\">Squirrels<\u002Fa>\n    <a href=\"#\" style=\"font-size: 13px; font-weight: 700; color: #fff; background: #088486; text-decoration: none; padding: 6px 14px; border-radius: 3px;\">Beavers<\u002Fa>\n    <a href=\"#\" style=\"font-size: 13px; font-weight: 700; color: #6a6488; text-decoration: none; padding: 6px 14px; border-radius: 3px;\">Cubs<\u002Fa>\n    <a href=\"#\" style=\"font-size: 13px; font-weight: 700; color: #6a6488; text-decoration: none; padding: 6px 14px; border-radius: 3px;\">Scouts<\u002Fa>\n    <a href=\"#\" style=\"font-size: 13px; font-weight: 700; color: #6a6488; text-decoration: none; padding: 6px 14px; border-radius: 3px;\">Explorers<\u002Fa>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ── BREADCRUMB ──────────────────────────────────────── -->\n\n\n<!-- ── PAGE HEADER ────────────────────────────────────── -->\n<section style=\"background: #088486; padding: 60px 0; position: relative; overflow: hidden;\">\n  <div style=\"position: absolute; top: -80px; right: -60px; width: 320px; height: 320px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.08);\"><\u002Fdiv>\n  <div style=\"position: absolute; top: -20px; right: 60px; width: 180px; height: 180px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.07);\"><\u002Fdiv>\n  <div style=\"position: absolute; bottom: -60px; left: -40px; width: 240px; height: 240px; border-radius: 50%; background: rgba(0,0,0,0.06);\"><\u002Fdiv>\n  <div style=\"position: absolute; bottom: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, #7413dc 0%, #25b755 100%);\"><\u002Fdiv>\n  <div style=\"position: relative; z-index: 2; max-width: 1240px; margin: 0 auto; padding: 0 64px; display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: center;\">\n    <div>\n      <!-- Section logo on white card -->\n      <div style=\"background: #fff; border-radius: 6px; padding: 16px 22px; display: inline-block; margin-bottom: 24px; box-shadow: 0 4px 16px rgba(0,0,0,0.12);\">\n        <img src=\"1dbfb848-d98f-4f26-9997-018caa8e29d0\" alt=\"Beaver Scouts\" style=\"height: 72px; width: auto; display: block;\">\n      <\u002Fdiv>\n      <div style=\"display: flex; gap: 12px; align-items: center; margin-bottom: 18px; flex-wrap: wrap;\">\n        <div style=\"background: rgba(255,255,255,0.18); border-radius: 100px; padding: 5px 16px;\">\n          <p style=\"font-size: 12px; font-weight: 700; color: #fff; letter-spacing: 0.1em; text-transform: uppercase;\">Section · Ages 6 to 8<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"font-size: 18px; font-weight: 300; color: rgba(255,255,255,0.9); line-height: 1.65; max-width: 440px; text-wrap: pretty;\">Big adventures start here. From pond-dipping to performing at Carnival, Beaver Scouts is where young people aged 6–8 discover what they're capable of.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display: flex; flex-direction: column; gap: 14px; align-items: flex-end;\">\n      <div style=\"background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.18); border-radius: 8px; padding: 22px 28px; width: 100%; max-width: 340px;\">\n        <p style=\"font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.55); margin-bottom: 10px;\">We run two colonies<\u002Fp>\n        <div style=\"display: flex; flex-direction: column; gap: 8px;\">\n          <div style=\"display: flex; align-items: center; gap: 10px;\">\n            <div style=\"width: 8px; height: 8px; border-radius: 50%; background: #fff; flex-shrink: 0;\"><\u002Fdiv>\n            <p style=\"font-size: 15px; font-weight: 700; color: #fff;\">Bartley Water Beavers<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"display: flex; align-items: center; gap: 10px;\">\n            <div style=\"width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.5); flex-shrink: 0;\"><\u002Fdiv>\n            <p style=\"font-size: 15px; font-weight: 700; color: rgba(255,255,255,0.82);\">Cadnam River Beavers<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font-size: 13px; font-weight: 400; color: rgba(255,255,255,0.55); margin-top: 14px; line-height: 1.6; text-wrap: pretty;\">Each colony has its own leaders, meeting day, and identity. Find the right one for your family below.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ── GROUP CARDS ─────────────────────────────────────── -->\n<section style=\"background: #faf9f5; padding: 72px 0;\">\n  <div style=\"max-width: 1240px; margin: 0 auto; padding: 0 64px;\">\n    <p style=\"font-size: 17px; font-weight: 400; color: #4a4668; line-height: 1.75; max-width: 640px; margin-bottom: 52px; text-wrap: pretty;\">We run <strong style=\"color: #1c1a2e; font-weight: 700;\">two separate Beaver colonies<\u002Fstrong> — both part of 2nd Copythorne (Stanley's Own), but each with its own leaders, its own meeting night, and its own character. Click through to find out who runs each one and when they meet.<\u002Fp>\n\n    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 28px;\">\n\n      <!-- Card 1: Bartley Water -->\n      <article style=\"background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.09); display: flex; flex-direction: column;\">\n        <div style=\"height: 300px; position: relative; overflow: hidden; flex-shrink: 0;\">\n          <div style=\"position: absolute; inset: 0; background: linear-gradient(180deg, transparent 40%, rgba(5,40,42,0.72) 100%), linear-gradient(148deg, #064e68 0%, #0d7a9c 20%, #088486 46%, #0a6e70 70%, #063f40 100%);\"><\u002Fdiv>\n          <div style=\"position: absolute; top: 10%; left: 22%; width: 200px; height: 58px; background: rgba(255,255,255,0.06); border-radius: 50%; filter: blur(22px);\"><\u002Fdiv>\n          <div style=\"position: absolute; bottom: 0; left: 0; right: 0; padding: 20px 28px;\">\n            <p style=\"font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.5); letter-spacing: 0.16em; text-transform: uppercase; margin-bottom: 6px;\">Beaver Colony<\u002Fp>\n            <h2 style=\"font-size: 28px; font-weight: 900; color: #fff; letter-spacing: -0.01em; line-height: 1.1;\">Bartley Water<br>Beavers<\u002Fh2>\n          <\u002Fdiv>\n          <div style=\"position: absolute; top: 16px; right: 16px; background: rgba(0,0,0,0.42); backdrop-filter: blur(4px); padding: 5px 10px; border-radius: 3px;\">\n            <p style=\"font-family: 'Courier New', monospace; font-size: 9px; color: rgba(255,255,255,0.5); letter-spacing: 0.1em; text-transform: uppercase;\">Photo placeholder<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding: 28px 32px 32px; display: flex; flex-direction: column; flex: 1;\">\n          <p style=\"font-size: 15px; font-weight: 400; color: #4a4668; line-height: 1.7; margin-bottom: 20px; flex: 1; text-wrap: pretty;\">Bartley Water Beavers meet on Monday evenings. A friendly, active colony with their own programme of challenges, outings and community activities.<\u002Fp>\n          <div style=\"display: flex; align-items: center; gap: 10px; margin-bottom: 12px; padding-top: 12px; border-top: 1px solid #f0f0f0;\">\n            <div style=\"width: 30px; height: 30px; border-radius: 50%; background: #077072; flex-shrink: 0; display: flex; align-items: center; justify-content: center;\"><span style=\"font-size: 12px; font-weight: 900; color: #fff;\">T<\u002Fspan><\u002Fdiv>\n            <div><p style=\"font-size: 13px; font-weight: 700; color: #1c1a2e;\">Tracy Hogan<\u002Fp><p style=\"font-size: 11px; color: #9490b0; text-transform: uppercase; letter-spacing: 0.07em; line-height: 1.4;\">Lead Volunteer<\u002Fp><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display: flex; align-items: center; justify-content: space-between; padding-top: 14px; border-top: 1px solid #eee;\">\n            <div style=\"display: flex; align-items: center; gap: 8px;\">\n              <div style=\"width: 8px; height: 8px; border-radius: 50%; background: #088486;\"><\u002Fdiv>\n              <p style=\"font-size: 13px; font-weight: 700; color: #6a6488;\">Monday evenings<\u002Fp>\n            <\u002Fdiv>\n            <a href=\"#\" style=\"background: #088486; color: #fff; font-weight: 700; font-size: 14px; padding: 10px 22px; border-radius: 4px; text-decoration: none;\">Find out more →<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Farticle>\n\n      <!-- Card 2: Cadnam River -->\n      <article style=\"background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.09); display: flex; flex-direction: column;\">\n        <div style=\"height: 300px; position: relative; overflow: hidden; flex-shrink: 0;\">\n          <div style=\"position: absolute; inset: 0; background: linear-gradient(180deg, transparent 40%, rgba(12,36,10,0.72) 100%), linear-gradient(135deg, #1a6830 0%, #2a9040 18%, #248a50 42%, #1e6838 64%, #144428 100%);\"><\u002Fdiv>\n          <div style=\"position: absolute; top: 10%; right: 18%; width: 180px; height: 52px; background: rgba(255,255,255,0.07); border-radius: 50%; filter: blur(20px);\"><\u002Fdiv>\n          <div style=\"position: absolute; bottom: 0; left: 0; right: 0; padding: 20px 28px;\">\n            <p style=\"font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.5); letter-spacing: 0.16em; text-transform: uppercase; margin-bottom: 6px;\">Beaver Colony<\u002Fp>\n            <h2 style=\"font-size: 28px; font-weight: 900; color: #fff; letter-spacing: -0.01em; line-height: 1.1;\">Cadnam River<br>Beavers<\u002Fh2>\n          <\u002Fdiv>\n          <div style=\"position: absolute; top: 16px; right: 16px; background: rgba(0,0,0,0.42); backdrop-filter: blur(4px); padding: 5px 10px; border-radius: 3px;\">\n            <p style=\"font-family: 'Courier New', monospace; font-size: 9px; color: rgba(255,255,255,0.5); letter-spacing: 0.1em; text-transform: uppercase;\">Photo placeholder<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding: 28px 32px 32px; display: flex; flex-direction: column; flex: 1;\">\n          <p style=\"font-size: 15px; font-weight: 400; color: #4a4668; line-height: 1.7; margin-bottom: 20px; flex: 1; text-wrap: pretty;\">Cadnam River Beavers meet on Thursday evenings. Their own leaders, their own traditions — and the same brilliant adventurous programme.<\u002Fp>\n          <div style=\"display: flex; align-items: center; gap: 10px; margin-bottom: 12px; padding-top: 12px; border-top: 1px solid #f0f0f0;\">\n            <div style=\"width: 30px; height: 30px; border-radius: 50%; background: #077072; flex-shrink: 0; display: flex; align-items: center; justify-content: center;\"><span style=\"font-size: 12px; font-weight: 900; color: #fff;\">J<\u002Fspan><\u002Fdiv>\n            <div><p style=\"font-size: 13px; font-weight: 700; color: #1c1a2e;\">Jude Turvey<\u002Fp><p style=\"font-size: 11px; color: #9490b0; text-transform: uppercase; letter-spacing: 0.07em; line-height: 1.4;\">Lead Volunteer<\u002Fp><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display: flex; align-items: center; justify-content: space-between; padding-top: 14px; border-top: 1px solid #eee;\">\n            <div style=\"display: flex; align-items: center; gap: 8px;\">\n              <div style=\"width: 8px; height: 8px; border-radius: 50%; background: #088486;\"><\u002Fdiv>\n              <p style=\"font-size: 13px; font-weight: 700; color: #6a6488;\">Thursday evenings<\u002Fp>\n            <\u002Fdiv>\n            <a href=\"#\" style=\"background: #088486; color: #fff; font-weight: 700; font-size: 14px; padding: 10px 22px; border-radius: 4px; text-decoration: none;\">Find out more →<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Farticle>\n\n    <\u002Fdiv>\n\n    <!-- Not sure which? -->\n    <div style=\"margin-top: 40px; background: #fff; border: 2px solid #e8e4f0; border-radius: 8px; padding: 28px 36px; display: flex; align-items: center; justify-content: space-between; gap: 32px;\">\n      <div>\n        <p style=\"font-size: 16px; font-weight: 700; color: #1c1a2e; margin-bottom: 6px;\">Not sure which colony is right for you?<\u002Fp>\n        <p style=\"font-size: 14px; font-weight: 400; color: #6a6488; line-height: 1.6;\">Places can vary across the two colonies. Drop us a message and we'll point you in the right direction.<\u002Fp>\n      <\u002Fdiv>\n      <a href=\"#\" style=\"background: #7413dc; color: #fff; font-weight: 700; font-size: 14px; padding: 12px 26px; border-radius: 4px; text-decoration: none; white-space: nowrap; flex-shrink: 0;\">Get in touch →<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ── WHAT IS BEAVERS? ────────────────────────────────── -->\n<section style=\"background: #fff; padding: 72px 0; border-top: 1px solid #f0eef8;\">\n  <div style=\"max-width: 1240px; margin: 0 auto; padding: 0 64px;\">\n    <div style=\"display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 28px; margin-bottom: 44px;\">\n      <div style=\"background: #f0f9f9; border-radius: 6px; padding: 30px 32px; border-top: 4px solid #088486;\">\n        <p style=\"font-size: 13px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #088486; margin-bottom: 12px;\">What they do<\u002Fp>\n        <p style=\"font-size: 15px; font-weight: 400; color: #4a4668; line-height: 1.72; text-wrap: pretty;\">Games, crafts, nature walks, badges, community service, sleepovers. Every meeting is different — that's the point.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background: #f4eeff; border-radius: 6px; padding: 30px 32px; border-top: 4px solid #7413dc;\">\n        <p style=\"font-size: 13px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #7413dc; margin-bottom: 12px;\">Who can join<\u002Fp>\n        <p style=\"font-size: 15px; font-weight: 400; color: #4a4668; line-height: 1.72; text-wrap: pretty;\">Young people aged 6–8. They can join from their 6th birthday and move up to Cubs around their 8th.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background: #eaf8f1; border-radius: 6px; padding: 30px 32px; border-top: 4px solid #25b755;\">\n        <p style=\"font-size: 13px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #25b755; margin-bottom: 12px;\">Chief Scout's Bronze<\u002Fp>\n        <p style=\"font-size: 15px; font-weight: 400; color: #4a4668; line-height: 1.72; text-wrap: pretty;\">The highest award for Beavers — earned through challenges across adventure, world, skills, community and outdoors.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Getting kitted out -->\n    <div style=\"background: #f0f9f9; border-radius: 6px; padding: 26px 30px; margin-bottom: 20px; border: 1px solid #d0eaea;\">\n      <p style=\"font-size: 13px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #088486; margin-bottom: 16px;\">Getting kitted out<\u002Fp>\n      <div style=\"display: flex; flex-direction: column; gap: 11px;\">\n        <div style=\"display: flex; gap: 12px; align-items: flex-start;\">\n          <div style=\"width: 6px; height: 6px; border-radius: 50%; background: #088486; flex-shrink: 0; margin-top: 8px;\"><\u002Fdiv>\n          <p style=\"font-size: 14px; color: #3a4a48; line-height: 1.65;\"><strong style=\"color: #1c1a2e;\">Necker, woggle and all membership badges<\u002Fstrong> — we provide these. You'll receive your necker, woggle and membership badges when you are invested. Activity and Challenge Badges will be presented as they're earned.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display: flex; gap: 12px; align-items: flex-start;\">\n          <div style=\"width: 6px; height: 6px; border-radius: 50%; background: #088486; flex-shrink: 0; margin-top: 8px;\"><\u002Fdiv>\n          <p style=\"font-size: 14px; color: #3a4a48; line-height: 1.65;\"><strong style=\"color: #1c1a2e;\">Uniform<\u002Fstrong> — as a minimum you'll need the section jumper. Available from the Scout Store, Amazon, some school uniform suppliers, and Oasis in Romsey.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display: flex; gap: 12px; align-items: flex-start;\">\n          <div style=\"width: 6px; height: 6px; border-radius: 50%; background: #088486; flex-shrink: 0; margin-top: 8px;\"><\u002Fdiv>\n          <p style=\"font-size: 14px; color: #3a4a48; line-height: 1.65;\"><strong style=\"color: #1c1a2e;\">Official days &amp; parades<\u002Fstrong> — we ask that you wear smart school trousers and\u002For skirts (if you don't want the expense of the officially branded lower uniform) along with smart shoes, preferably not trainers.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display: flex; gap: 12px; align-items: flex-start;\">\n          <div style=\"width: 6px; height: 6px; border-radius: 50%; background: #088486; flex-shrink: 0; margin-top: 8px;\"><\u002Fdiv>\n          <p style=\"font-size: 14px; color: #3a4a48; line-height: 1.65;\"><strong style=\"color: #1c1a2e;\">Badges<\u002Fstrong> — need to be sewn on. Our local \"Badge Fairy\" offers a sewing service for a small fee — contact details coming soon.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Quick Links -->\n    <p style=\"font-size: 11px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: #088486; margin-bottom: 12px;\">Useful links<\u002Fp>\n    <div style=\"border-radius: 6px; overflow: hidden; border: 1px solid #d0eaea;\">\n      <a href=\"https:\u002F\u002Fwww.scouts.org.uk\u002Fbeavers\u002Fbeavers-uniform-and-badge-placement\u002F\" target=\"_blank\" style=\"display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 14px 20px; text-decoration: none; border-left: 3px solid #088486; background: #fff;\">\n        <span st
