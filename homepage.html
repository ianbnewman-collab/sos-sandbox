  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ecoration: none; border-bottom: 2px solid #7413dc; padding-bottom: 2px;\">All news →<\u002Fa>\n    <\u002Fdiv>\n    <div style=\"display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px;\">\n\n      <article style=\"background: #fff; border-radius: 6px; overflow: hidden; box-shadow: 0 2px 14px rgba(0,0,0,0.06); display: flex; flex-direction: column;\">\n        <div style=\"height: 5px; background: #7413dc;\"><\u002Fdiv>\n        <div style=\"padding: 28px 30px; display: flex; flex-direction: column; flex: 1;\">\n          <p style=\"font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: #7413dc; margin-bottom: 12px;\">Summer Camp<\u002Fp>\n          <h3 style=\"font-size: 20px; font-weight: 900; color: #1c1a2e; line-height: 1.25; letter-spacing: -0.01em; margin-bottom: 12px;\">Summer Camp 2025 — what an adventure<\u002Fh3>\n          <p style=\"font-size: 15px; font-weight: 400; color: #4a4668; line-height: 1.65; margin-bottom: 22px; text-wrap: pretty; flex: 1;\">From midnight hikes to cooking over an open fire, our Scouts had the time of their lives at Ferny Crofts. Full report inside.<\u002Fp>\n          <div style=\"display: flex; justify-content: space-between; align-items: center;\">\n            <time style=\"font-size: 12px; font-weight: 700; color: rgba(100,95,130,0.55); letter-spacing: 0.04em;\">18 June 2025<\u002Ftime>\n            <a href=\"#\" style=\"font-size: 13px; font-weight: 700; color: #7413dc; text-decoration: none;\">Read more →<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Farticle>\n\n      <article style=\"background: #fff; border-radius: 6px; overflow: hidden; box-shadow: 0 2px 14px rgba(0,0,0,0.06); display: flex; flex-direction: column;\">\n        <div style=\"height: 5px; background: #088486;\"><\u002Fdiv>\n        <div style=\"padding: 28px 30px; display: flex; flex-direction: column; flex: 1;\">\n          <p style=\"font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: #088486; margin-bottom: 12px;\">Volunteers<\u002Fp>\n          <h3 style=\"font-size: 20px; font-weight: 900; color: #1c1a2e; line-height: 1.25; letter-spacing: -0.01em; margin-bottom: 12px;\">Could you spare one evening a week?<\u002Fh3>\n          <p style=\"font-size: 15px; font-weight: 400; color: #4a4668; line-height: 1.65; margin-bottom: 22px; text-wrap: pretty; flex: 1;\">Our Beavers section is looking for an extra pair of hands. No Scout experience needed — just enthusiasm and a DBS check.<\u002Fp>\n          <div style=\"display: flex; justify-content: space-between; align-items: center;\">\n            <time style=\"font-size: 12px; font-weight: 700; color: rgba(100,95,130,0.55); letter-spacing: 0.04em;\">10 June 2025<\u002Ftime>\n            <a href=\"#\" style=\"font-size: 13px; font-weight: 700; color: #088486; text-decoration: none;\">Get in touch →<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Farticle>\n\n      <article style=\"background: #003982; border-radius: 6px; overflow: hidden; position: relative; box-shadow: 0 2px 14px rgba(0,0,0,0.14); display: flex; flex-direction: column;\">\n        <div style=\"position: absolute; top: -22px; right: -22px; width: 140px; height: 140px; border-radius: 50%; background: rgba(255,255,255,0.04); pointer-events: none;\"><\u002Fdiv>\n        <div style=\"padding: 28px 30px; position: relative; z-index: 1; display: flex; flex-direction: column; flex: 1;\">\n          <p style=\"font-size: 11px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(255,255,255,0.48); margin-bottom: 14px;\">Stanley's Own Magazine<\u002Fp>\n          <div style=\"background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.14); border-radius: 4px; padding: 10px 14px; margin-bottom: 18px; display: inline-block; align-self: flex-start;\">\n            <p style=\"font-size: 9px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(255,255,255,0.46); margin-bottom: 4px;\">Summer Issue<\u002Fp>\n            <p style=\"font-size: 20px; font-weight: 900; color: #fff; letter-spacing: -0.01em; line-height: 1.15;\">Stanley's Own Magazine<br>Issue 734<\u002Fp>\n          <\u002Fdiv>\n          <h3 style=\"font-size: 20px; font-weight: 900; color: #fff; line-height: 1.25; letter-spacing: -0.01em; margin-bottom: 12px;\">Summer 2025 issue out now<\u002Fh3>\n          <p style=\"font-size: 15px; font-weight: 400; color: rgba(255,255,255,0.72); line-height: 1.65; margin-bottom: 22px; text-wrap: pretty; flex: 1;\">Camp reports, badge news, and photos from across the Group. Going strong since 1963.<\u002Fp>\n          <div style=\"display: flex; justify-content: space-between; align-items: center;\">\n            <time style=\"font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.35); letter-spacing: 0.04em;\">July 2025<\u002Ftime>\n            <a href=\"#\" style=\"font-size: 13px; font-weight: 700; color: #fff; text-decoration: none; background: rgba(255,255,255,0.15); padding: 6px 14px; border-radius: 3px;\">Read online →<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Farticle>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ── EVENTS STRIP ────────────────────────────────────── -->\n<section style=\"background: #003982; padding: 80px 0;\">\n  <div style=\"max-width: 1240px; margin: 0 auto; padding: 0 64px;\">\n    <div style=\"display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 44px;\">\n      <div>\n        <p style=\"font-size: 11px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(255,255,255,0.44); margin-bottom: 8px;\">What's coming up<\u002Fp>\n        <h2 style=\"font-size: 38px; font-weight: 900; color: #fff; letter-spacing: -0.02em;\">Upcoming Events<\u002Fh2>\n      <\u002Fdiv>\n      <a href=\"#\" style=\"font-size: 14px; font-weight: 700; color: rgba(255,255,255,0.65); text-decoration: none; border-bottom: 2px solid rgba(255,255,255,0.3); padding-bottom: 2px;\">Full calendar →<\u002Fa>\n    <\u002Fdiv>\n    <div style=\"display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;\">\n\n      <div style=\"background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; overflow: hidden; display: flex;\">\n        <div style=\"background: #25b755; padding: 24px 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 78px; flex-shrink: 0;\">\n          <p style=\"font-size: 11px; font-weight: 700; color: rgba(0,0,0,0.5); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px;\">Jul<\u002Fp>\n          <p style=\"font-size: 40px; font-weight: 900; color: #fff; line-height: 1; letter-spacing: -0.02em;\">19<\u002Fp>\n          <p style=\"font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.72); margin-top: 4px;\">Sat<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"padding: 22px 24px;\">\n          <h3 style=\"font-size: 18px; font-weight: 900; color: #fff; letter-spacing: -0.01em; margin-bottom: 8px; line-height: 1.2;\">Copythorne Carnival<\u002Fh3>\n          <p style=\"font-size: 14px; font-weight: 400; color: rgba(255,255,255,0.68); line-height: 1.6; margin-bottom: 14px; text-wrap: pretty;\">Join us on the village green — stalls, games, and the famous welly throw. All welcome.<\u002Fp>\n          <a href=\"#\" style=\"font-size: 13px; font-weight: 700; color: #25b755; text-decoration: none;\">Find out more →<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; overflow: hidden; display: flex;\">\n        <div style=\"background: #088486; padding: 24px 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 78px; flex-shrink: 0;\">\n          <p style=\"font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.6); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px;\">Dec<\u002Fp>\n          <p style=\"font-size: 40px; font-weight: 900; color: #fff; line-height: 1; letter-spacing: -0.02em;\">6<\u002Fp>\n          <p style=\"font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.72); margin-top: 4px;\">Sat<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"padding: 22px 24px;\">\n          <h3 style=\"font-size: 18px; font-weight: 900; color: #fff; letter-spacing: -0.01em; margin-bottom: 8px; line-height: 1.2;\">Christmas Fair<\u002Fh3>\n          <p style=\"font-size: 14px; font-weight: 400; color: rgba(255,255,255,0.68); line-height: 1.6; margin-bottom: 14px; text-wrap: pretty;\">Mince pies, craft stalls, tombola, and a very special visitor. Charles King Hall.<\u002Fp>\n          <a href=\"#\" style=\"font-size: 13px; font-weight: 700; color: #88e0e1; text-decoration: none;\">Find out more →<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; overflow: hidden; display: flex;\">\n        <div style=\"background: #7413dc; padding: 24px 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 78px; flex-shrink: 0;\">\n          <p style=\"font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.6); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px;\">Aug<\u002Fp>\n          <p style=\"font-size: 40px; font-weight: 900; color: #fff; line-height: 1; letter-spacing: -0.02em;\">4<\u002Fp>\n          <p style=\"font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.72); margin-top: 4px;\">Mon<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"padding: 22px 24px;\">\n          <h3 style=\"font-size: 18px; font-weight: 900; color: #fff; letter-spacing: -0.01em; margin-bottom: 8px; line-height: 1.2;\">Scouts Summer Camp<\u002Fh3>\n          <p style=\"font-size: 14px; font-weight: 400; color: rgba(255,255,255,0.68); line-height: 1.6; margin-bottom: 14px; text-wrap: pretty;\">Five nights under canvas in the New Forest. Speak to your leader about places.<\u002Fp>\n          <a href=\"#\" style=\"font-size: 13px; font-weight: 700; color: #c4a3ff; text-decoration: none;\">Find out more →<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ── ABOUT US ────────────────────────────────────────── -->\n<section style=\"background: #fff; padding: 96px 0;\">\n  <div style=\"max-width: 1240px; margin: 0 auto; padding: 0 64px; display: grid; grid-template-columns: 1fr 1fr; gap: 88px; align-items: center;\">\n    <div>\n      <p style=\"font-size: 11px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: #7413dc; margin-bottom: 10px;\">About Us<\u002Fp>\n      <h2 style=\"font-size: 46px; font-weight: 900; color: #1c1a2e; letter-spacing: -0.025em; line-height: 1.04; margin-bottom: 24px; text-wrap: pretty;\">Part of this community since 1910.<\u002Fh2>\n      <p style=\"font-size: 17px; font-weight: 400; color: #4a4668; line-height: 1.75; margin-bottom: 18px; text-wrap: pretty;\">We're 2nd Copythorne (Stanley's Own) Scout Group — one of Hampshire's longest-running Scout groups, meeting at Charles King Hall on Romsey Road since our earliest days.<\u002Fp>\n      <p style=\"font-size: 17px; font-weight: 400; color: #4a4668; line-height: 1.75; margin-bottom: 38px; text-wrap: pretty;\">Today we run sections for young people aged 4 to 18, supported by a team of dedicated volunteer leaders. Learning by doing — campcraft, community service, creative challenges, and a lot of muddy fun.<\u002Fp>\n      <a href=\"#\" style=\"background: #7413dc; color: #fff; font-weight: 700; font-size: 15px; padding: 13px 30px; border-radius: 4px; text-decoration: none; display: inline-block;\">Our story →<\u002Fa>\n    <\u002Fdiv>\n    <div style=\"display: flex; flex-direction: column; gap: 20px;\">\n      <div style=\"background: #f4eeff; border-left: 5px solid #7413dc; border-radius: 0 6px 6px 0; padding: 30px 34px;\">\n        <p style=\"font-size: 60px; font-weight: 900; color: #7413dc; letter-spacing: -0.03em; line-height: 1;\">115+<\u002Fp>\n        <p style=\"font-size: 17px; font-weight: 700; color: #1c1a2e; margin-top: 6px;\">Years of Scouting<\u002Fp>\n        <p style=\"font-size: 14px; font-weight: 400; color: #6a6488; margin-top: 4px;\">Founded 1910. Still going strong.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 16px;\">\n        <div style=\"background: #eaf8f1; border-radius: 6px; padding: 24px 26px;\">\n          <p style=\"font-size: 40px; font-weight: 900; color: #25b755; letter-spacing: -0.02em; line-height: 1;\">5<\u002Fp>\n          <p style=\"font-size: 15px; font-weight: 700; color: #1c1a2e; margin-top: 8px;\">Sections<\u002Fp>\n          <p style=\"font-size: 13px; font-weight: 400; color: #6a6488; margin-top: 3px;\">Squirrels to Explorers<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background: #e5f0ff; border-radius: 6px; padding: 24px 26px;\">\n          <p style=\"font-size: 40px; font-weight: 900; color: #006ddf; letter-spacing: -0.02em; line-height: 1;\">4–18<\u002Fp>\n          <p style=\"font-size: 15px; font-weight: 700; color: #1c1a2e; margin-top: 8px;\">Age range<\u002Fp>\n          <p style=\"font-size: 13px; font-weight: 400; color: #6a6488; margin-top: 3px;\">Something for everyone<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ── GET INVOLVED — CTA PAIR ─────────────────────────── -->\n<section style=\"display: grid; grid-template-columns: 1fr 1fr;\">\n  <div style=\"background: #7413dc; padding: 72px 80px; display: flex; flex-direction: column; justify-content: center; min-height: 360px;\">\n    <p style=\"font-size: 11px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.48); margin-bottom: 14px;\">Get involved<\u002Fp>\n    <h2 style=\"font-size: 40px; font-weight: 900; color: #fff; letter-spacing: -0.02em; line-height: 1.08; margin-bottom: 16px;\">Volunteer with us<\u002Fh2>\n    <p style=\"font-size: 16px; font-weight: 400; color: rgba(255,255,255,0.82); line-height: 1.7; max-width: 400px; margin-bottom: 36px; text-wrap: pretty;\">No Scout experience required — we'll train you. Give it six weeks. You'll stay for years. Come and make a real difference.<\u002Fp>\n    <a href=\"#\" style=\"background: #fff; color: #7413dc; font-weight: 700; font-size: 15px; padding: 13px 30px; border-radius: 4px; text-decoration: none; display: inline-block; align-self: flex-start;\">Find out more →<\u002Fa>\n  <\u002Fdiv>\n  <div style=\"background: #088486; padding: 72px 80px; display: flex; flex-direction: column; justify-content: center; min-height: 360px;\">\n    <p style=\"font-size: 11px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.48); margin-bottom: 14px;\">Hire our venue<\u002Fp>\n    <h2 style=\"font-size: 40px; font-weight: 900; color: #fff; letter-spacing: -0.02em; line-height: 1.08; margin-bottom: 16px;\">Hire Scout HQ<\u002Fh2>\n    <p style=\"font-size: 16px; font-weight: 400; color: rgba(255,255,255,0.82); line-height: 1.7; max-width: 400px; margin-bottom: 36px; text-wrap: pretty;\">A large hall, meeting rooms, kitchen and outdoor space — available for local groups, organisations, private events, and visiting Scout and Guide groups hosting residential stays. All bookings support the Group.<\u002Fp>\n    <a href=\"#\" style=\"background: #fff; color: #088486; font-weight: 700; font-size: 15px; padding: 13px 30px; border-radius: 4px; text-decoration: none; display: inline-block; align-self: flex-start;\">Check availability →<\u002Fa>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ── FOOTER ──────────────────────────────────────
